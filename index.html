<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acordos Realizados | Cooperativa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- CABEÇALHO COM LOGO -->
        <div class="header">
            <div class="logo-area">
                <img src="imagens/logo_acord.png" alt="Logo Acord" class="logo" id="logo">
            </div>
        </div>

        <!-- CARD PRINCIPAL: DADOS DO ACORDO -->
        <div class="card">
            <div class="card-header">
                <span>🔍 Acordo Ativo</span>
                <div class="busca-area">
                    <input type="text" id="buscaProcesso" placeholder="Nº do Processo">
                    <button id="btnBuscar" class="btn-outline">🔍 Buscar</button>
                    <button id="btnNovoAcordo" class="btn-outline">➕ Novo Acordo</button>
                </div>
            </div>

            <div class="form-grid">
                <div class="campo">
                    <label>Código Coop.</label>
                    <input type="text" id="codigoCoop">
                </div>
                <div class="campo">
                    <label>Nome da Cooperativa</label>
                    <input type="text" id="nomeCoop">
                </div>
                <div class="campo">
                    <label>Nº Processo</label>
                    <input type="text" id="numeroProcesso">
                </div>
                <div class="campo">
                    <label>Nome da Parte</label>
                    <input type="text" id="nomeParte">
                </div>
                <div class="campo">
                    <label>CPF/CNPJ</label>
                    <input type="text" id="cpf">
                </div>
                <div class="campo">
                    <label>Data de Ajuizamento</label>
                    <input type="text" id="dataAjuizamento" placeholder="DD/MM/AAAA">
                </div>
                <div class="campo">
                    <label>Comarca</label>
                    <input type="text" id="comarca">
                </div>
                <div class="campo">
                    <label>Tipo de Ação</label>
                    <input type="text" id="tipoAcao">
                </div>
                <div class="campo">
                    <label>Nº Contrato</label>
                    <input type="text" id="numContrato">
                </div>
                <div class="campo">
                    <label>Tipo de Operação</label>
                    <input type="text" id="tipoOperacao">
                </div>
                <div class="campo">
                    <label>Valor da Causa (R$)</label>
                    <input type="number" id="valorCausa" step="0.01">
                </div>
                <div class="campo">
                    <label>Qtd. Parcelas</label>
                    <input type="number" id="qtdParcelas">
                </div>
                <div class="campo">
                    <label>Valor da Parcela (R$)</label>
                    <input type="number" id="valorParcela" step="0.01">
                </div>
            </div>
        </div>

        <!-- RESUMO FINANCEIRO -->
        <div class="card">
            <h3>💰 Resumo Financeiro</h3>
            <div class="resumo-linha">
                <div class="resumo-item"><span>Valor do Débito:</span> <strong id="valorDebito">R$ 0,00</strong></div>
                <div class="resumo-item"><span>Total Pago:</span> <strong id="totalPago">R$ 0,00</strong></div>
                <div class="resumo-item"><span>Qtd. de Parcelas:</span> <strong id="qtdParcelasResumo">0</strong></div>
                <div class="resumo-item"><span>Valor da Parcela:</span> <strong id="valorParcelaResumo">R$ 0,00</strong></div>
                <div class="resumo-item"><span>Saldo Devedor:</span> <strong id="saldoDevedor">R$ 0,00</strong></div>
            </div>
        </div>

        <!-- REGISTRAR PAGAMENTO MENSAL -->
        <div class="card">
            <h3>📆 Pagamento Realizado</h3>
            <div class="pagamento-area">
                <div class="campo">
                    <label>Mês/Ano de referência</label>
                    <input type="month" id="mesReferencia">
                </div>
                <div class="campo">
                    <label>Valor Pago neste mês (R$)</label>
                    <input type="number" id="valorPagoMes" step="0.01" value="0.00">
                </div>
                <button id="btnRegistrarPagamento" class="btn-primario">💾 Registrar Pagamento</button>
            </div>
        </div>

        <!-- OBSERVAÇÕES -->
        <div class="card">
            <h3>📝 Observações</h3>
            <textarea id="observacoes" rows="3" placeholder="Digite aqui alguma informação importante sobre o acordo, contato, negociação, etc."></textarea>
        </div>

        <!-- TABELA DE PAGAMENTOS REGISTRADOS -->
        <div class="card">
            <div class="flex-tabela">
                <h3>📋 Pagamentos Registrados</h3>
                <button id="btnHistorico" class="btn-link">Ver histórico completo ></button>
            </div>
            <div class="tabela-wrapper">
                <table id="tabelaPagamentos">
                    <thead>
                        <tr><th>Parcela</th><th>Mês de Referência</th><th>Data do Registro</th><th>Valor Pago</th><th>Status</th><th>Saldo Devedor</th></tr>
                    </thead>
                    <tbody id="tbodyPagamentos">
                        <tr><td colspan="6" style="text-align: center;">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="proximaParcelaInfo" class="info-proxima"></div>
        </div>
    </div>

        <!-- Firebase Config -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
